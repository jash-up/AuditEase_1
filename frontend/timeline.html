<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timeline — AuditEase</title>
  <meta name="description" content="Audit timeline and milestone tracking — coming soon." />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/topbar.css" />
  <link rel="stylesheet" href="/css/sidebar.css" />
  <script src="/js/theme.js"></script>
  <style>
    .coming-soon {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - var(--topbar-height));
      padding-left: var(--sidebar-width);
      text-align: center;
      gap: 16px;
    }
    .coming-soon-icon {
      width: 72px; height: 72px;
      background: var(--bg-raised);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 8px;
    }
    .coming-soon h1 { font-size: 28px; letter-spacing: -0.02em; }
    .coming-soon p { color: var(--text-secondary); font-size: 15px; }
    .coming-soon .badge-soon {
      background: var(--accent-subtle);
      color: var(--accent);
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="topbar-mount"></div>
  <div id="sidebar-mount"></div>
  <main class="coming-soon" role="main">
    <div class="coming-soon-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5">
        <line x1="12" y1="2" x2="12" y2="6"/>
        <line x1="12" y1="18" x2="12" y2="22"/>
        <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/>
        <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/>
        <line x1="2" y1="12" x2="6" y2="12"/>
        <line x1="18" y1="12" x2="22" y2="12"/>
        <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/>
        <line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>
      </svg>
    </div>
    <span class="badge-soon">Coming Soon</span>
    <h1>Timeline</h1>
    <p>Visual audit milestones, deadlines, and submission tracking will appear here.</p>
    <a href="/index.html" class="btn btn-ghost">← Back to Home</a>
  </main>
  <script src="/js/auth.js"></script>
  <script src="/js/topbar.js"></script>
  <script src="/js/sidebar.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      window.AE.initTopbar({ showBack: true });
      window.AE.initSidebar('timeline');
    });
  </script>
</body>
</html>

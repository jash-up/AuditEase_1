<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document Dashboard — AuditEase</title>
  <meta name="description" content="Document status overview by category with progress tracking and document management." />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/topbar.css" />
  <link rel="stylesheet" href="/css/sidebar.css" />
  <link rel="stylesheet" href="/css/pages/doc-dashboard.css" />
</head>
<body data-protected="true">
  <div id="topbar-mount"></div>
  <div id="sidebar-mount"></div>

  <!-- Sub-Nav -->
  <div class="subnav" style="margin-left:var(--sidebar-width);">
    <div class="subnav-carousel">
      <a href="/documents/archives.html" class="subnav-item">Archives</a>
      <span class="subnav-item active">Dashboard</span>
      <a href="/documents/vault.html" class="subnav-item">Document Vault</a>
    </div>
    <div class="subnav-upload">
      <button class="btn btn-primary btn-sm" id="upload-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span class="upload-label">Upload</span>
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="page-body" id="dashboard-body" style="margin-left:var(--sidebar-width);padding-top:var(--topbar-height);">
    <div class="dashboard-content" id="dashboard-content">
      <!-- Category Cards -->
      <div class="dashboard-top" id="dashboard-top">
        <div class="category-card" style="display:flex;align-items:center;justify-content:center;min-height:180px;">
          <span class="spinner"></span>
        </div>
        <div class="category-card" style="display:flex;align-items:center;justify-content:center;min-height:180px;">
          <span class="spinner"></span>
        </div>
        <div class="category-card" style="display:flex;align-items:center;justify-content:center;min-height:180px;">
          <span class="spinner"></span>
        </div>
      </div>

      <!-- Document List Panel -->
      <div class="dashboard-bottom">
        <div class="doc-panel-header" id="doc-panel-header">
          <div class="doc-panel-title" style="color:var(--text-muted);">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            Documents
          </div>
        </div>
        <div id="doc-panel-body">
          <div class="doc-panel-empty">Select a status above to view documents</div>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/theme.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/topbar.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/pages/doc-dashboard.js"></script>
</body>
</html>

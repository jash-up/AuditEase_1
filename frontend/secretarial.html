<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secretarial — AuditEase</title>
  <meta name="description" content="Corporate secretarial and governance management — coming soon." />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/topbar.css" />
  <link rel="stylesheet" href="/css/sidebar.css" />
  <script src="/js/theme.js"></script>
  <style>
    .coming-soon { display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - var(--topbar-height));padding-left:var(--sidebar-width);text-align:center;gap:16px; }
    .coming-soon-icon { width:72px;height:72px;background:var(--bg-raised);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:8px; }
    .coming-soon h1 { font-size:28px;letter-spacing:-0.02em; }
    .coming-soon p { color:var(--text-secondary);font-size:15px; }
    .badge-soon { background:var(--accent-subtle);color:var(--accent);padding:4px 14px;border-radius:20px;font-size:12px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase; }
  </style>
</head>
<body>
  <div id="topbar-mount"></div>
  <div id="sidebar-mount"></div>
  <main class="coming-soon" role="main">
    <div class="coming-soon-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
    </div>
    <span class="badge-soon">Coming Soon</span>
    <h1>Secretarial</h1>
    <p>Board minutes, AGM filings, statutory registers, and corporate governance tools coming soon.</p>
    <a href="/index.html" class="btn btn-ghost">← Back to Home</a>
  </main>
  <script src="/js/auth.js"></script>
  <script src="/js/topbar.js"></script>
  <script src="/js/sidebar.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      window.AE.initTopbar({ showBack: true });
      window.AE.initSidebar('secretarial');
    });
  </script>
</body>
</html>
